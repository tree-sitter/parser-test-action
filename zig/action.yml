name: Tree-sitter parser test (Zig)
description: Test a tree-sitter parser in Zig

inputs:
  zig-version:
    description: Zig version
    default: "0.13.0"

runs:
  using: composite
  steps:
    - name: Set up Zig
      uses: mlugg/setup-zig@v1
      with:
        use-cache: true
        version: ${{inputs.zig-version}}
    - name: Build module
      shell: sh
      run: zig build
    - name: Run tests
      shell: sh
      run: zig build test --verbose
